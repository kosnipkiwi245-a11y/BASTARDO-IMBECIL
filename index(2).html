<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Instalador Ultra Pirata 3000</title>
<style>
body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:Consolas}
#bg{position:fixed;inset:0;background:radial-gradient(circle,#222,#000);}
#steam{position:fixed;width:64px;left:20px;top:20px;animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#win{position:absolute;width:850px;height:560px;background:#c0c0c0;border:4px solid #fff;
box-shadow:0 0 30px cyan;color:#000}
#title{height:34px;background:#0044cc;color:#fff;padding:8px;font-weight:bold}
#screen{position:relative;margin:8px;height:420px;background:#000;overflow:hidden}
#doom{width:100%;height:100%;object-fit:cover}
#troll{position:absolute;left:365px;top:118px;width:115px;
animation:head .25s infinite alternate ease-in-out;
filter:drop-shadow(0 0 6px #fff)}
@keyframes head{
0%{transform:rotate(-6deg) translateY(-2px)}
50%{transform:rotate(5deg) translateY(2px)}
100%{transform:rotate(-3deg)}
}
#status{padding:8px;font-weight:bold}
#panel{position:fixed;right:20px;top:20px;width:320px;background:#000;border:2px solid lime;
padding:10px;color:lime;font-size:13px;display:none}
.fake{position:fixed;background:#ddd;color:#000;padding:8px;border:3px outset #fff;
font-weight:bold;box-shadow:0 0 15px magenta}
</style>
</head>
<body>
<div id="bg"></div>

<img id="steam" src="Steam_icon_logo.svg.webp">
<audio id="music" src="0703.mp3" loop></audio>

<div id="win">
<div id="title">🧌 INSTALADOR ULTRA PIRATA 3000</div>
<div id="screen">
<img id="doom" src="g1ia7k75sva31.gif">
<img id="troll" src="Trollface.png">
</div>
<div id="status">Inicializando caos...</div>
</div>

<div id="panel"><b>ANTI PIRATEO MEME SCANNER</b><hr><div id="log"></div></div>

<script>
music.play().catch(()=>{document.onclick=()=>music.play();},{once:true});

let wx=80,wy=70,vx=4.5,vy=3.8;
const w=document.getElementById("win");

function loop(){
 wx+=vx; wy+=vy;
 if(wx<0||wx+w.offsetWidth>innerWidth)vx*=-1;
 if(wy<0||wy+w.offsetHeight>innerHeight)vy*=-1;
 w.style.left=wx+"px";
 w.style.top=wy+"px";
 requestAnimationFrame(loop);
}
loop();

const s=document.getElementById("steam");
let sx=10,sy=10,svx=6,svy=5;
function steamLoop(){
 sx+=svx; sy+=svy;
 if(sx<0||sx+64>innerWidth)svx*=-1;
 if(sy<0||sy+64>innerHeight)svy*=-1;
 s.style.left=sx+"px";
 s.style.top=sy+"px";
 requestAnimationFrame(steamLoop);
}
steamLoop();

const msgs=[
"Conectando con la NASA...",
"Descargando más RAM...",
"Hackeando el refrigerador...",
"Leyendo pensamientos...",
"Consultando al gato supremo...",
"Steam se está riendo...",
"Compilando memes..."
];
let i=0;
setInterval(()=>{
document.getElementById("status").textContent=msgs[i++%msgs.length];
},1200);

setTimeout(()=>{
panel.style.display="block";
log.innerHTML=`
Usuario: Tremendo Piratón<br>
Steam: xX_NoEraVirus_Xx<br>
PC: Tostadora Gamer RGB<br>
Pantalla: ${screen.width}x${screen.height}<br>
Idioma: ${navigator.language}<br>
SO: ${navigator.platform}<br>
Zona: ${Intl.DateTimeFormat().resolvedOptions().timeZone}<hr>
<b style="color:red">Resultado: Culpable de hacer click XD</b>`;
},3500);

const pops=[
"Descargando RAM...",
"Hackeando el gato...",
"DOOMGUY APROBÓ EL BAILE",
"Esto es una broma XD",
"Windows está confundido"
];
setInterval(()=>{
const d=document.createElement("div");
d.className="fake";
d.textContent=pops[Math.floor(Math.random()*pops.length)];
d.style.left=Math.random()*(innerWidth-220)+"px";
d.style.top=Math.random()*(innerHeight-80)+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),2200);
},900);
</script>
</body>
</html>
